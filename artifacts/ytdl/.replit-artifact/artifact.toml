kind = "mobile"
previewPath = "/"
title = "YouTube Downloader"
version = "1.0.0"
id = "artifacts/ytdl"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
localPort = 21694
name = "expo"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/ytdl run dev"

[services.env]
PORT = "21694"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/ytdl", "run", "build"]
run = ["pnpm", "--filter", "@workspace/ytdl", "run", "serve"]
